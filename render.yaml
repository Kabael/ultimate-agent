# Ultimate Agent Platform - Render Blueprint
services:
  - type: web
    name: ultimate-agent-api
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    dockerfilePath: ./backend/Dockerfile
    build:
      context: ./backend
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_SHEETS_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    plan: free

  - type: web
    name: openclaw-gateway
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    dockerfilePath: ./openclaw/Dockerfile
    build:
      context: ./openclaw
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
    plan: free

  - type: web
    name: n8n
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    dockerfilePath: ./n8n/Dockerfile
    build:
      context: ./n8n
    plan: free

  - type: web
    name: duckduckgo-proxy
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    dockerfilePath: ./ddg-proxy/Dockerfile
    build:
      context: ./ddg-proxy
    plan: free

  - type: postgres
    name: ultimate-agent-db
    plan: free
    ipAllowList: []
