# Ultimate Agent Platform - Render Blueprint
services:
  - type: web
    name: ultimate-agent-api
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    build:
      context: ./backend
      dockerfile: Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_SHEETS_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    plan: free

  - type: web
    name: openclaw-gateway
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
    plan: free

  - type: web
    name: n8n
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    build:
      context: ./n8n
      dockerfile: Dockerfile
    plan: free

  - type: web
    name: duckduckgo-proxy
    runtime: image
    repo: https://github.com/Kabael/ultimate-agent
    branch: main
    build:
      context: ./ddg-proxy
      dockerfile: Dockerfile
    plan: free
